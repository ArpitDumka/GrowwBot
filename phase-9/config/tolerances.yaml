# Per-field numeric tolerances (edge 9.02)
fields:
  expense_ratio:
    tolerance: 0.01
    unit: "%"
  nav:
    tolerance_percent: 0.5
    unit: "inr"
  aum:
    tolerance_percent: 5.0
  min_sip:
    tolerance: 0
    unit: "inr"

staleness:
  max_days_since_verified: 120

link_check:
  timeout_seconds: 30
  retries: 1
  soft_fail: true
