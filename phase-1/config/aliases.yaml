  "HDFC Liquid Fund":
    - "hdfc liquid"
    - "hdfc liquid fund"
    - "hdfc liquid direct"
    - "hdfc liquid direct plan"
    - "hdfc liquid direct plan growth"

# Historical / renamed surface forms. Matching one of these triggers a
# "(formerly ...)" note in the composer (Phase 7). Mark with `legacy: true`.
legacy_aliases:
  "HDFC Flexi Cap Fund":
    - "hdfc equity fund"           # renamed 2023
    - "hdfc equity"
    - "hdfc equity direct growth"
