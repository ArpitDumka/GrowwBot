# Scheme alias dictionary — Phase 1.5
#
# Maps free-form user phrasings to one canonical scheme name. The canonical
# name MUST appear in config/sources.yaml. Each alias MUST be unique across
# the whole file (edge case 1.10: no alias collisions).
#
# Conventions:
#   - Aliases are stored exactly as the user might type (lowercase, with
#     common spacing variants). The alias resolver in `ingest.aliases`
#     normalizes both sides (case-fold, strip punctuation, collapse spaces)
#     before matching.
#   - The canonical name itself does NOT need to be listed as an alias; the
#     resolver tries an exact canonical-match first.
#   - `legacy_aliases` are historical surface forms (e.g. "HDFC Equity Fund"
#     -> HDFC Flexi Cap Fund). The composer may surface a "(formerly ...)"
#     note when one of these matches (edge case 1.11).

aliases:
  "HDFC Mid Cap Fund":
    - "hdfc midcap"
    - "hdfc mid-cap"
    - "hdfc mid cap"
    - "hdfc mid cap fund"
    - "hdfc mid cap fund direct growth"

  "HDFC Flexi Cap Fund":
    - "hdfc flexi cap"
    - "hdfc flexicap"
    - "hdfc flexi cap fund"
    - "hdfc flexi cap direct"
    - "hdfc flexi cap direct growth"

  "HDFC Small Cap Fund":
    - "hdfc smallcap"
    - "hdfc small cap"
    - "hdfc small cap fund"
    - "hdfc small cap fund direct"
    - "hdfc small cap fund direct growth"

