# Re-triggers corpus-refresh if GitHub skips the 08:30 IST schedule.
# Source template: phase-10/workflows/corpus-refresh-watchdog.yml
name: Corpus refresh watchdog

on:
  schedule:
    - cron: "45 8 * * *"
      timezone: "Asia/Kolkata"
    - cron: "0 9 * * *"
      timezone: "Asia/Kolkata"
    - cron: "30 9 * * *"
      timezone: "Asia/Kolkata"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  ensure-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide if corpus refresh is needed
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const today = new Intl.DateTimeFormat('en-CA', {
              timeZone: 'Asia/Kolkata',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
            }).format(new Date());

            const inProgress = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'corpus-refresh.yml',
              status: 'in_progress',
              per_page: 1,
            });
            if (inProgress.data.total_count > 0) {
              core.info('Corpus refresh already running; nothing to do.');
              core.setOutput('needed', 'false');
              return;
            }

            const queued = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'corpus-refresh.yml',
              status: 'queued',
              per_page: 1,
            });
            if (queued.data.total_count > 0) {
              core.info('Corpus refresh already queued; nothing to do.');
              core.setOutput('needed', 'false');
              return;
            }

            const commits = await github.rest.repos.listCommits({
              owner,
              repo,
              sha: 'main',
              per_page: 30,
            });
            const marker = `chore(corpus): automated refresh ${today}`;
            const alreadyDone = commits.data.some((commit) =>
              (commit.commit.message || '').includes(marker),
            );
            if (alreadyDone) {
              core.info(`Corpus already refreshed for ${today} (IST).`);
              core.setOutput('needed', 'false');
              return;
            }

            core.info(`No refresh commit for ${today} (IST); dispatching corpus refresh.`);
            core.setOutput('needed', 'true');

      - name: Trigger corpus refresh
        if: steps.gate.outputs.needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'corpus-refresh.yml',
              ref: 'main',
            });
            core.info('Dispatched corpus-refresh.yml on main.');
