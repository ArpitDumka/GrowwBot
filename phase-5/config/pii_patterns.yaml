# Phase 5.1 — PII detection (edge cases 5.01–5.04, 5.20)
# PAN is matched after whitespace/punctuation normalization in code.

patterns:
  pan:
    - '(?i)\b[A-Z]{5}\d{4}[A-Z]\b'
  aadhaar_spaced:
    - '\b\d{4}\s\d{4}\s\d{4}\b'
  aadhaar_12:
  # Avoid matching arbitrary 12-digit numbers in fund facts; require word boundary + not all same digit
    - '(?<!\d)\d{12}(?!\d)'
  phone_in:
    - '(?i)\b(?:\+91[\s\-]?)?[6-9]\d{9}\b'
  email:
    - '(?i)\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b'
  otp:
    - '(?i)\b(?:otp|one[\s\-]?time[\s\-]?password)\b[^\n]{0,40}\b\d{4,8}\b'
  account:
    - '(?i)\b(?:account|a/c|acct)[\s#:]*\d{6,18}\b'
  ifsc:
    - '(?i)\b[A-Z]{4}0[A-Z0-9]{6}\b'
  card:
    - '\b(?:\d{4}[\s\-]?){3}\d{4}\b'
  cvv:
    - '(?i)\b(?:cvv|cvc|card[\s\-]?verification)\s*[:#]?\s*\d{3,4}\b'
  password:
    - '(?i)\b(?:password|passwd|pwd|otp|pin)\s*[:=]\s*\S{4,}'
  ssn:
    - '\b\d{3}-\d{2}-\d{4}\b'
