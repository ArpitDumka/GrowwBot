# Phase 10.2 - Scheduled corpus refresh
#
# GitHub only runs workflows from .github/workflows/.
# Keep this source template under phase-10; copy it to:
#   .github/workflows/corpus-refresh.yml
# when you want the remote scheduler active.
name: Corpus refresh

on:
  schedule:
    # Daily 02:30 UTC (~08:00 IST). Groww fetcher is already rate-limited.
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      skip_index:
        description: "Skip embedding/index build (ingest + chunk only)"
        required: false
        type: boolean
        default: false
      test_embedder:
        description: "Use hashing embedder for fast workflow validation"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Phase 2-4 and Phase 10 packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "phase-2/[dev]"
          pip install -e "phase-3/[dev]"
          pip install -e "phase-4/[dev,export]"
          pip install -e "phase-10/[dev]"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-${{ runner.os }}-${{ hashFiles('phase-4/pyproject.toml') }}
          restore-keys: |
            hf-bge-small-${{ runner.os }}-

      - name: Run Phase 10.2 refresh
        run: |
          args=()
          if [ "${{ inputs.skip_index }}" = "true" ]; then args+=("--skip-index"); fi
          if [ "${{ inputs.test_embedder }}" = "true" ]; then args+=("--test-embedder"); fi
          mf-corpus-refresh "${args[@]}"

      - name: Upload corpus artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ github.run_id }}
          retention-days: 14
          path: |
            phase-2/data/processed/
            phase-3/data/chunks.jsonl
            phase-4/data/index/
            phase-10/reports/last_refresh.json
