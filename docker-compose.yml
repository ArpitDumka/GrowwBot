# Local production smoke test (same image as Render).
# Usage (repo root): copy .env.example to .env, set GROQ_API_KEY, then:
#   docker compose up --build
# API: http://127.0.0.1:8000/healthz

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
